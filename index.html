<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Wrangle</title>
    <!-- Blend the browser chrome / safe areas (Dynamic Island, home bar)
         into the game's parchment instead of showing black. -->
    <meta name="theme-color" content="#e8d9b5" />
    <!-- "Add to Home Screen" runs fullscreen - the closest browser preview
         of how the wrapped app will look. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- "default" makes standalone mode START the webview BELOW the status
         bar / Dynamic Island (iOS paints that strip with our parchment
         theme-color) instead of drawing the page underneath it. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Wrangle" />
    <!-- App icon (browser tab + ADD TO HOME SCREEN). The real iOS icon set
         is generated from this art at the M10 Capacitor wrap. -->
    <link rel="icon" type="image/png" href="/sprites/ui/Wrangle%20Logo%20Final%20v2%20180x180.png" />
    <link rel="apple-touch-icon" href="/sprites/ui/Wrangle%20Logo%20Final%20v2%20180x180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #e8d9b5; /* parchment - safe areas and letterbox blend in */
        overflow: hidden;
        font-family: 'Silkscreen', monospace;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* Pin the game between the safe areas with FIXED positioning - no
         dvh, no calc(), no margins (all of which have iOS quirks). In
         browser Safari the insets are 0 and this is simply the full
         visible viewport; in standalone mode the box starts below the
         status area and stops above the home indicator. */
      #game {
        position: fixed;
        left: 0;
        right: 0;
        top: env(safe-area-inset-top, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
